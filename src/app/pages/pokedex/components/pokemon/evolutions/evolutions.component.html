@if (isLoading) {
  <div class="h-100 d-flex align-items-center justify-content-center">
    <img src="assets/img/pokeball-spinner.gif" width="64" height="64" alt="Waiter" />
  </div>
}

<div class="row" id="chain">
  @for (pokemon of displayEvolution; track pokemon; let i = $index) {
    <div class="col">
      <ngkdx-poke-box [pokemon]="pokemon" (clickEvent)="onPokeboxClick.emit(pokemon)" />
    </div>
    @if (i < displayEvolution.length-1) {
      <div class="col-auto next-icon">
        <em class="fas fa-4x fa-angle-right"></em>
      </div>
    }
  }
</div>
